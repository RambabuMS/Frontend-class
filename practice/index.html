<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Portfolio</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #f4f4f9; color: #333; }

        /* Section 1: Hero (Flexbox) */
        .hero {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            padding: 80px 10%;
            background: #fff;
        }
        .hero-content { flex: 1; min-width: 300px; }
        .hero-image { flex: 1; min-width: 300px; text-align: right; }
        .hero-image img { max-width: 100%; border-radius: 20px; }

        /* Section 2: Skills (Grid) */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 60px 10%;
        }
        .skill-card { background: #007bff; color: white; padding: 30px; text-align: center; border-radius: 8px; }

        @media (max-width: 768px) {
            .skills-grid { grid-template-columns: 1fr; }
        }

        /* Section 3: Contact (Position + Transform) */
        .contact-container {
            height: 400px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #eee;
        }
        .contact-card {
            width: 300px;
            padding: 40px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
            transition: transform 0.3s ease;
            border-radius: 12px;
        }
        .contact-card:hover { transform: scale(1.05); }
        
        .floating-icon {
            position: absolute;
            top: -25px;
            right: -25px;
            background: #ff4757;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-content">
            <h1>Creative Developer</h1>
            <p>Building digital experiences with precision and flair.</p>
        </div>
        <div class="hero-image">
            <img src="https://via.placeholder.com" alt="Profile">
        </div>
    </section>

    <section class="skills-grid">
        <div class="skill-card">Frontend</div>
        <div class="skill-card">Backend</div>
        <div class="skill-card">Design</div>
    </section>

    <section class="contact-container">
        <div class="contact-card">
            <div class="floating-icon">Hi!</div>
            <h3>Let's Talk</h3>
            <p>Available for freelance projects.</p>
        </div>
    </section>

</body>
</html>
