<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form and Flex</title>
    <link rel="stylesheet" href="flex-and-form.css">
</head>

<body>
    <div id="container">
        <div id="form-div">
            <form action="">
                <div>
                    <label for="name">USERNAME:</label><br>
                    <input type="text" id="name" name="name" required>
                </div>
                <div>
                    <label for="email">EMAIL ID:</label><br>
                    <input type="email" id="email" name="email" required>
                </div>
                <div>
                    <label for="password">PASSWORD:</label><br>
                    <input type="password" id="password" name="password" minlength="8" required>
                </div>
                <div>
                    <label for="mobile">MOBILE NUMBER:</label><br>
                    <input type="tel" id="mobile" name="mobile" maxlength="10" pattern="[0-9]{10}"
                        title="Format: 9876543210" required>
                </div>
                <div>
                    <label>GENDER:</label><br>
                    <input type="radio" id="male" name="gender" value="male" required><label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female"><label for="female">Female</label>
                    <input type="radio" id="other" name="gender" value="other"><label for="other">Other</label>
                </div>
                <div>
                    <input type="checkbox" id="terms" name="terms" value="agree" required><label for="terms">I
                        acknowledge the terms and conditions</label>
                </div>
                <div>
                    <input type="submit">
                </div>
            </form>
        </div>
